<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - POS Toko Roti Solo Satu</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="login-page">

<div class="login-box">

    <div class="logo">
        🍞
    </div>

    <h2>POS Toko Roti Solo Satu</h2>

    <p>Silakan Login</p>

    <form id="loginForm">

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input
            type="text"
            id="username"
            placeholder="Username"
            required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
            type="password"
            id="password"
            placeholder="Password"
            required>
        </div>

        <button type="submit">
            Login
        </button>

        <p class="error" id="error"></p>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
